name: Deploy Jekyll with GitHub Pages dependencies preinstalled
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Banner
        run: |
          cat << 'EOF'
           _   _           _   _____                  _   
          | \ | | _____  _| |_|  ___|__ _ __ _ __ ___| |_ 
          |  \| |/ _ \ \/ / __| |_ / _ \ '__| '__/ _ \ __|
          | |\  |  __/>  <| |_|  _|  __/ |  | | |  __/ |_ 
          |_| \_|\___/_/\_\\__|_|  \___|_|  |_|  \___|\__|
          EOF
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Build failed
        if: failure()
        run: echo "Oh no it failed..."
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Deploy succeeded
        if: success()
        run: echo "WORKED *BOOM*"
      - name: Deploy failed
        if: failure()
        run: echo "Oh no it failed..."
